<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Subhuuuuuuu</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:black;
      overflow:hidden;
      color:white;
    }

    .container{
      width:100%;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:60px;
      position:relative;
    }

    /* LEFT SIDE */

    .left{
      width:45%;
      z-index:2;
      animation:fadeLeft 2s ease;
    }

    .left h1{
      font-size:70px;
      margin-bottom:20px;
      color:white;
      text-shadow:0 0 20px pink;
    }

    .left p{
      font-size:28px;
      line-height:45px;
      color:#f5f5f5;
    }

    /* RIGHT SIDE */

    .right{
      width:45%;
      display:flex;
      justify-content:center;
      align-items:center;
      position:relative;
    }

    .slide{
      width:400px;
      height:500px;
      object-fit:cover;
      border-radius:25px;
      position:absolute;
      opacity:0;
      transition:opacity 1.5s ease-in-out;
      box-shadow:0 0 40px rgba(255,255,255,0.2);
    }

    .active{
      opacity:1;
    }

    /* HEARTS */

    .heart{
      position:absolute;
      color:pink;
      font-size:20px;
      animation:float 6s linear infinite;
      opacity:0.7;
    }

    @keyframes float{

      0%{
        transform:translateY(100vh) scale(0);
      }

      100%{
        transform:translateY(-10vh) scale(1.5);
        opacity:0;
      }

    }

    @keyframes fadeLeft{

      from{
        opacity:0;
        transform:translateX(-50px);
      }

      to{
        opacity:1;
        transform:translateX(0);
      }

    }

  </style>

</head>

<body>

<div class="container">

  <!-- LEFT SIDE -->

  <div class="left">

    <h1>Happy Birthday ❤️</h1>

    <p id="message">
      Happy Birthday Subhuuuuuu ✨
    </p>

  </div>


  <!-- MUSIC -->

  <audio id="bgmusic" autoplay loop hidden>
    <source src="./music.mp3" type="audio/mp3">
  </audio>


  <!-- RIGHT SIDE -->

  <div class="right">

    <img src="images/1st_image.jpg" class="slide active">
    <img src="images/2nd_image.jpg" class="slide">
    <img src="images/3rd_image.jpg" class="slide">
    <img src="images/4th_image.jpg" class="slide">
    <img src="images/5th_image.jpg" class="slide">
    <img src="images/6th_image.jpg" class="slide">
    <img src="images/7th_image.jpg" class="slide">
    <img src="images/8th_image.jpg" class="slide">

  </div>

</div>


<script>

  // MUSIC

  window.onload = () => {

    const music = document.getElementById("bgmusic");

    music.volume = 1;

    music.play().catch(() => {

      document.body.addEventListener("click", () => {
        music.play();
      }, { once: true });

    });

  };



  // SLIDESHOW

  const slides = document.querySelectorAll(".slide");

  const messages = [

    "You deserve all the happiness 🌸",

    "Tumhe pata hai na, I’m always a little scared of you 😭 but thank you for always teaching me the best things ❤️",

    "Thank you for being such an awesome friend ✨",

    "Keep smiling forever 😊",

    "Your presence is everything in a group 💖",

    "Stay happy and keep shining 🌙",

    "Happy Birthday Once Again 🎂",

    "😊🌸💖"

  ];

  let current = 0;

  const message = document.getElementById("message");


  setInterval(() => {

    slides[current].classList.remove("active");

    current = (current + 1) % slides.length;

    slides[current].classList.add("active");

    message.innerText = messages[current % messages.length];

  }, 4000);



  // FLOATING HEARTS

  function createHeart(){

    const heart = document.createElement("div");

    heart.classList.add("heart");

    heart.innerHTML = "❤";

    heart.style.left = Math.random() * 100 + "vw";

    heart.style.fontSize = Math.random() * 20 + 10 + "px";

    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 6000);

  }

  setInterval(createHeart, 300);

</script>

</body>

</html>
