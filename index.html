<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Subhuuuuu</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:black;
      overflow:hidden;
      color:white;
    }

    /* START SCREEN */

    #startScreen{
      width:100%;
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      position:fixed;
      top:0;
      left:0;
      background:black;
      z-index:9999;
    }

    #startScreen h1{
      font-size:80px;
      color:white;
      text-shadow:0 0 20px pink;
      margin-bottom:40px;
      text-align:center;
    }

    #openBtn{
      padding:18px 50px;
      font-size:28px;
      border:none;
      border-radius:50px;
      background:pink;
      color:black;
      cursor:pointer;
      transition:0.3s;
      font-weight:bold;
    }

    #openBtn:hover{
      transform:scale(1.1);
      box-shadow:0 0 20px pink;
    }

    /* MAIN CONTAINER */

    .container{
      width:100%;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:60px;
      position:relative;
      opacity:0;
      visibility:hidden;
      transition:1s;
    }

    .show{
      opacity:1;
      visibility:visible;
    }

    /* LEFT SIDE */

    .left{
      width:45%;
      z-index:2;
    }

    .left h1{
      font-size:70px;
      margin-bottom:20px;
      color:white;
      text-shadow:0 0 20px pink;
    }

    .left p{
      font-size:28px;
      line-height:45px;
      color:#f5f5f5;
    }

    /* RIGHT SIDE */

    .right{
      width:45%;
      display:flex;
      justify-content:center;
      align-items:center;
      position:relative;
    }

    .slide{
      width:400px;
      height:500px;
      object-fit:cover;
      border-radius:25px;
      position:absolute;
      opacity:0;
      transition:opacity 1.5s ease-in-out;
      box-shadow:0 0 40px rgba(255,255,255,0.2);
    }

    .active{
      opacity:1;
    }

    /* HEARTS */

    .heart{
      position:absolute;
      color:pink;
      font-size:20px;
      animation:float 6s linear infinite;
      opacity:0.7;
    }

    @keyframes float{

      0%{
        transform:translateY(100vh) scale(0);
      }

      100%{
        transform:translateY(-10vh) scale(1.5);
        opacity:0;
      }

    }

    /* ENDING SCREEN */

    #endingScreen{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100vh;
      background:black;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      z-index:999;
      opacity:0;
      visibility:hidden;
      transition:1s;
    }

    #typingText{
      font-size:70px;
      color:white;
      text-shadow:0 0 20px pink;
      padding:20px;
      border-right:4px solid pink;
      white-space:nowrap;
      overflow:hidden;
    }

    .showEnding{
      opacity:1 !important;
      visibility:visible !important;
    }

    /* MOBILE RESPONSIVE */

    @media(max-width:768px){

  body{
    overflow:hidden;
  }

  .container{
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:row;
    align-items:center;
    justify-content:space-between;
    padding:15px;
    gap:15px;
  }

  .left{
    width:50%;
  }

  .left h1{
    font-size:52px;
    line-height:60px;
    margin-bottom:15px;
  }

  .left p{
    font-size:18px;
    line-height:34px;
  }

  .right{
    width:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
  }

  .slide{
    width:220px;
    height:340px;
    border-radius:25px;
    object-fit:cover;
    object-position:center;
    box-shadow:0 0 25px rgba(255,255,255,0.25);
  }

  #startScreen h1{
    font-size:45px;
    padding:20px;
    text-align:center;
  }

  #openBtn{
    font-size:22px;
    padding:15px 35px;
  }

  #typingText{
    font-size:30px;
    white-space:normal;
    border-right:none;
    line-height:45px;
  }

}

  </style>

</head>

<body>

<!-- START SCREEN -->

<div id="startScreen">

  <h1>Happy Birthday Subhuuuuu ❤️</h1>

  <button id="openBtn">Open ✨</button>

</div>


<!-- MAIN WEBSITE -->

<div class="container" id="mainContent">

  <!-- LEFT SIDE -->

  <div class="left">

    <h1>Happy Birthday ✨🎂</h1>

    <p id="message">
       ✨🌸🎂❤️
    </p>

  </div>


  <!-- MUSIC -->

  <audio id="bgmusic" loop>
    <source src="./music.mp3" type="audio/mp3">
  </audio>


  <!-- RIGHT SIDE -->

  <div class="right">

    <img src="Images/1st_image.jpg" class="slide active">
    <img src="Images/2nd_image.jpg" class="slide">
    <img src="Images/3rd_image.jpg" class="slide">
    <img src="Images/4th_image.jpg" class="slide">
    <img src="Images/5th_image.jpg" class="slide">
    <img src="Images/6th_image.jpg" class="slide">
    <img src="Images/7th_image.jpg" class="slide">
    <img src="Images/8th_image.jpg" class="slide">

  </div>

</div>


<!-- ENDING SCREEN -->

<div id="endingScreen">

  <h1 id="typingText"></h1>

</div>


<script>

const openBtn = document.getElementById("openBtn");

const startScreen = document.getElementById("startScreen");

const mainContent = document.getElementById("mainContent");

const music = document.getElementById("bgmusic");


openBtn.addEventListener("click", () => {

  music.play();

  startScreen.style.display = "none";

  mainContent.classList.add("show");

});


/* SLIDESHOW */

const slides = document.querySelectorAll(".slide");

const messages = [

  "Thank you for being such an awesome friend ✨",

  "✨🌸Tumhe pata hai na, I’m always a little scared of you 😭 but thank you for always teaching me the best things ❤️🎂❤️",

  "hamesaaaa khushhhh reyheynaaaaaa 🌸",

  "jaldiiii seee placement lenaaa aur party denaaaaa 🤗😊",

  "Your presence is everything in a group 💖",

  "Stay happy and keep shining 🌙",

  "Happy Birthday Once Again 🎂",

  "😊🌸💖",

  
  "🤗🎂😊"

];

let current = 0;

const message = document.getElementById("message");


setInterval(() => {

  slides[current].classList.remove("active");

  current = (current + 1) % slides.length;

  slides[current].classList.add("active");

  message.innerText = messages[current];

}, 4000);



/* FLOATING HEARTS */

function createHeart(){

  const heart = document.createElement("div");

  heart.classList.add("heart");

  heart.innerHTML = "❤";

  heart.style.left = Math.random() * 100 + "vw";

  heart.style.fontSize = Math.random() * 20 + 10 + "px";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 6000);

}

setInterval(createHeart, 300);



/* ENDING SCREEN */

const endingScreen = document.getElementById("endingScreen");

const typingText = document.getElementById("typingText");

const finalMessage = "Once Again Happy Birthday Subhu❤️";


setTimeout(() => {

  document.querySelector(".container").style.display = "none";

  endingScreen.classList.add("showEnding");

  let i = 0;

  function typeWriter(){

    if(i < finalMessage.length){

      typingText.innerHTML += finalMessage.charAt(i);

      i++;

      setTimeout(typeWriter, 100);

    }

  }

  typeWriter();

}, 35000);

</script>

</body>

</html>
